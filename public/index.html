2.5\n\t\t\tc0,7.5,4.8,12.6,11.7,12.6c3.9,0,7.1-1.8,9.1-4.7l7.4,6.9c-2.9,4-8.2,7.9-17.1,7.9c-13.3,0-22.9-9.4-22.9-22.7\n\t\t\tC1512.9,335.3,1522.5,325.9,1535.8,325.9z\"><\u002Fpath>\n\t\t<path class=\"st0\" d=\"M1580,325.9c12.9,0,21.7,9.7,21.7,23.8v2.5h-32.1c0.7,5.5,5.1,10,12.4,10c4,0,8.8-1.6,11.5-4.3l5,7.3\n\t\t\tc-4.4,4-11.1,6-17.8,6c-13.2,0-23.1-8.9-23.1-22.7C1557.7,336,1566.9,325.9,1580,325.9z M1569.4,344.5h21.3\n\t\t\tc-0.3-4.1-3.1-9.6-10.7-9.6C1573,334.9,1569.9,340.2,1569.4,344.5z\"><\u002Fpath>\n\t<\u002Fg>\n<\u002Fg>\n<\u002Fsvg><\u002Fa>\n    <h1><strong>Data Access Request (DAR) guide<\u002Fstrong><\u002Fh1>\n    <p class=\"tagline\">A <strong>Data Access Request (DAR)<\u002Fstrong> is how a Principal Investigator applies for access to NIAGADS controlled-access datasets. This guide walks first-time applicants through what to prepare, how to submit, and how to get approved without delays.<\u002Fp>\n    <div class=\"header-meta\"><strong>How long it takes:<\u002Fstrong> roughly <strong>3–4 weeks<\u002Fstrong> from a complete submission to data access. The variable part is preparation — IRB approval and document signatures can take weeks to months, so start early.<\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ══ ELIGIBILITY GATE ══ -->\n  <section class=\"eligibility\">\n    <div class=\"eligibility-eyebrow\">Before you start<\u002Fdiv>\n    <div class=\"eligibility-title\">Can you apply?<\u002Fdiv>\n    <p class=\"eligibility-sub\">A DAR can only move forward if all four of these are true. If any one fails, resolve it before investing time in the rest of the application.<\u002Fp>\n    <ul class=\"eligibility-list\">\n      <li>You are a qualifying PI, a permanent employee at the PI level (faculty, senior scientist, or equivalent). Graduate students, postdocs, and trainees cannot submit.<\u002Fli>\n      <li><strong>You have three different people<\u002Fstrong> for the three key roles: the requesting investigator (PI), the Signing Official, and the IT Director. No one may hold more than one role.<\u002Fli>\n      <li>You can obtain IRB approval&nbsp;which is&nbsp; required for all controlled-access data, and it can take months at your institution. Start this first.<\u002Fli>\n      <li>Everyone uses an institutional email. Any applications using Gmail, Yahoo, or other free providers are returned for editing.<\u002Fli>\n    <\u002Ful>\n    <p class=\"eligibility-note\">Each of these is confirmed again in the checklist below. This box is just the fastest way to know whether it's worth submitting a request.<\u002Fp>\n  <\u002Fsection>\n\n  <nav class=\"nav\">\n    <a href=\"#checklist\" target=\"_blank\" rel=\"noopener\">Pre-application checklist<\u002Fa>\n    <a href=\"#timeline\" target=\"_blank\" rel=\"noopener\">Process timeline<\u002Fa>\n    <a href=\"#return-reasons\" target=\"_blank\" rel=\"noopener\">Common return reasons<\u002Fa>\n  <\u002Fnav>\n\n  <!-- ══════════════════════════════════════════════\n       SECTION 1: CHECKLIST\n  ══════════════════════════════════════════════ -->\n  <div class=\"section-wrap\" id=\"checklist\">\n    <div class=\"section-eyebrow\">Step 1 of 2<\u002Fdiv>\n    <h2>Pre-application checklist<\u002Fh2>\n    <p class=\"section-intro\">Complete every item before applying for dataset access. Incomplete submissions are returned and delay approval. Some requirements, like IRB approval, take months to obtain at your institution. Use this checklist to confirm you are ready before you begin.<\u002Fp>\n\n    <div class=\"leadtime-callout\">\n      <div class=\"leadtime-title\">Start these first — they have the longest lead times<\u002Fdiv>\n      <ul>\n        <li><strong>IRB approval and the full IRB protocol<\u002Fstrong> — can take weeks to months at your institution<\u002Fli>\n        <li><strong>Data Transfer Agreement (DTA)<\u002Fstrong> — needs signatures from both your institution and the University of Pennsylvania<\u002Fli>\n      <\u002Ful>\n      Everything else on this checklist can be assembled in parallel while these are underway.\n    <\u002Fdiv>\n\n    <div class=\"progress-row\">\n      <div class=\"progress-track\"><div class=\"progress-fill\" id=\"pb\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"progress-label\" id=\"pl\">0 of 15<\u002Fdiv>\n      <button type=\"button\" class=\"export-btn\" id=\"exportBtn\" title=\"Save a print-ready copy of the checklist with your checkmarks\">Save / Export ↓<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- ── Group 1 ── -->\n    <div class=\"cl-group\" id=\"grp-investigator\">\n      <div class=\"cl-group-header\"><span>1 — Investigator qualifications<\u002Fspan><span class=\"cl-group-count\"><\u002Fspan><\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">I am a permanent employee at the PI level (faculty, senior scientist, or equivalent)<\u002Fdiv>\n          <div class=\"lbl-sub\">Graduate students, postdocs, and trainees cannot submit. A qualifying PI must be the applicant.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">I have an eRA Commons ID.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">My Institutional Signing Official (SO) is identified and has an eRA Commons ID.<\u002Fdiv>\n          <div class=\"lbl-sub\">A Signing Official has institutional authority to legally bind the institution in grants administration matters. For most institutions, the SO is located in its Office of Sponsored Research or equivalent. Verify that you have identified the correct Signing Official and their eRA Commons ID before submitting.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">My Information Technology (IT) Director is identified.<\u002Fdiv>\n          <div class=\"lbl-sub\">The IT Director is expected to have the authority and capacity to ensure the NIH Security Best Practices for Users of Controlled-Access Data and the institution’s IT security requirements and policies. Verify that the individual currently serves in this role at your institution.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n\t\n\t <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">Each of the 3 Key Personnel each only occupy one role.<\u002Fdiv>\n          <div class=\"lbl-sub\">The investigator requesting access, the Signing Official, and the IT Director are different individuals. Applications where a key personnel occupies more than one role will be returned to the requestor.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv><!-- /group 1 -->\n\n    <!-- ── Group 2 ── -->\n    <div class=\"cl-group\" id=\"grp-irb\">\n      <div class=\"cl-group-header\"><span>2 — IRB documentation<\u002Fspan><span class=\"cl-group-count\"><\u002Fspan><\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">I have a current IRB approval letter with at least 6 months remaining before expiration.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"callout callout-critical\">All controlled-access data requires IRB approval which can take several months at most institutions. Begin this process before gathering other documents.<\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">I have the full IRB protocol, including the complete application and/or any documentation submitted to my IRB that led to their determination.<\u002Fdiv>\n          <div class=\"lbl-sub\">This is a separate document from the approval letter. Both are required.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"callout callout-critical\">The IRB protocol is not optional and cannot be waived. The approval letter alone is insufficient. Submissions missing the protocol are returned to the requestor.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ── Group 3 ── -->\n    <div class=\"cl-group\" id=\"grp-docs\">\n      <div class=\"cl-group-header\"><span>3 — Required documentation<\u002Fspan><span class=\"cl-group-count\"><\u002Fspan><\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\"><a href=\"https://niagads.scrollhelp.site/support/documents#Documents-DataDistributionAgreement\" target=\"_blank\" rel=\"noopener\">NIAGADS Data Distribution Agreement (DDA)<\u002Fa> is completed and signed by both PI and Signing Official.<\u002Fdiv>\n          <div class=\"lbl-sub\">\"Whereas\" section on page 2 lists both the PI name and institution; PI + SO signatures and dates on page 5.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\"><a href=\"https://www.nia.nih.gov/research/dn/alzheimers-disease-genomics-sharing-plan\" target=\"_blank\" rel=\"noopener\">NIA Genomic Data Sharing Plan<\u002Fa> is completed and signed by both PI and Signing Official.<\u002Fdiv>\n          <div class=\"lbl-sub\">Grant info on page 5 (write \"n/a\" if no grant); PI + SO signatures and dates on page 7.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\"><a href=\"https://niagads.scrollhelp.site/support/documents#Documents-DSSDataTransferAgreement\" target=\"_blank\" rel=\"noopener\">Data Transfer Agreement (DTA)<\u002Fa> is completed and ready to email to niagads@pennmedicine.upenn.edu on the day I submit.<\u002Fdiv>\n          <div class=\"lbl-sub\">The DTA is not uploaded through DARM; it is sent by email in parallel. A new DTA is required for each new DAR. Penn investigators use a Personnel Data Protection Agreement instead.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"callout callout-advisory\"><strong>Do not skip this step.<\u002Fstrong> Your DAR can progress through every review stage and then stall indefinitely in final approval until the DTA is signed by both the requesting institution and the University of Pennsylvania. Email the DTA the same day you submit your application.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ── Group 4 ── -->\n    <div class=\"cl-group\" id=\"grp-team\">\n      <div class=\"cl-group-header\"><span>4 — Your team<\u002Fspan><span class=\"cl-group-count\"><\u002Fspan><\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">I have identified everyone at my institution who will access or download data, including anyone I may want to add in the future.<\u002Fdiv>\n          <div class=\"lbl-sub\">Investigators, trainees, students, postdocs, staff, technicians, and anyone who will need access to the files<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"callout callout-critical\">Downloaders cannot be added after approval unless they were listed as internal collaborators at the time of submission. This policy cannot be waived. If someone might need to download data later, list them now.<\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">I have collected full contact information for each internal collaborator.<\u002Fdiv>\n          <div class=\"lbl-sub\">Full name, institutional email address, and phone number for each person<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">All personnel, including myself, will use institutional email addresses.<\u002Fdiv>\n          <div class=\"lbl-sub\">Applications with Gmail, Yahoo, or other free email providers are returned to the requestor.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ── Group 5 ── -->\n    <div class=\"cl-group\" id=\"grp-statements\">\n      <div class=\"cl-group-header\"><span>5 — Research statements<\u002Fspan><span class=\"cl-group-count\"><\u002Fspan><\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">Research Use Statement drafted (2,200 character limit)<\u002Fdiv>\n          <div class=\"lbl-sub\">Must include: research objectives, study design, analysis plan, and any planned collaborations<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">Non-Technical Summary drafted (1,100 character limit)<\u002Fdiv>\n          <div class=\"lbl-sub\">This is made publicly available; write for a general audience, not for reviewers<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"item\" onclick=\"toggle(this)\">\n        <div class=\"cb\"><svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"lbl\">\n          <div class=\"lbl-main\">Secondary/Derived Data Return Plan drafted<\u002Fdiv>\n          <div class=\"lbl-sub\">Describe what derived data will be returned to NIAGADS and when (upon publication, patent filing, or end of access; whichever is first)<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"badge\">Required<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Documents to upload — submission-day manifest -->\n    <div class=\"doc-manifest\">\n      <div class=\"doc-manifest-head\">\n        <div class=\"doc-manifest-title\">Documents to have in hand on submission day<\u002Fdiv>\n        <div class=\"doc-manifest-sub\">Four are uploaded in DARM; the DTA is emailed separately the same day. Links go to the source documents.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"doc-row\"><span class=\"doc-name\">IRB approval letter (6+ months before expiry)<\u002Fspan><span class=\"doc-where\">Upload in DARM<\u002Fspan><\u002Fdiv>\n      <div class=\"doc-row\"><span class=\"doc-name\">Full IRB protocol<\u002Fspan><span class=\"doc-where\">Upload in DARM<\u002Fspan><\u002Fdiv>\n      <div class=\"doc-row\"><a href=\"https://niagads.scrollhelp.site/support/documents#Documents-DataDistributionAgreement\" target=\"_blank\" rel=\"noopener\">Data Distribution Agreement (DDA)<\u002Fa><span class=\"doc-where\">Upload in DARM<\u002Fspan><\u002Fdiv>\n      <div class=\"doc-row\"><a href=\"https://www.nia.nih.gov/research/dn/alzheimers-disease-genomics-sharing-plan\" target=\"_blank\" rel=\"noopener\">NIA Genomic Data Sharing Plan<\u002Fa><span class=\"doc-where\">Upload in DARM<\u002Fspan><\u002Fdiv>\n      <div class=\"doc-row\"><a href=\"https://niagads.scrollhelp.site/support/documents#Documents-DSSDataTransferAgreement\" target=\"_blank\" rel=\"noopener\">Data Transfer Agreement (DTA)<\u002Fa><span class=\"doc-where email\">Email to NIAGADS<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Completion banner — gold accent, earned here -->\n    <div id=\"ready-banner\">\n      <div class=\"ready-title\">You're ready to apply<\u002Fdiv>\n      <p>Log into DARM at <a href=\"https://dss.niagads.org/login\" target=\"_blank\" rel=\"noopener\">dss.niagads.org/login<\u002Fa> to begin your application. Email your signed DTA to <a href=\"mailto:niagads@pennmedicine.upenn.edu\" target=\"_blank\" rel=\"noopener\">niagads@pennmedicine.upenn.edu<\u002Fa> the same day you submit. Before approval, save your AWS Canonical ID in your DSS profile so S3 permissions activate automatically upon approval.<\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fdiv><!-- /checklist section -->\n\n\n  <!-- ══════════════════════════════════════════════\n       SECTION 2: TIMELINE\n  ══════════════════════════════════════════════ -->\n  <div class=\"section-wrap\" id=\"timeline\">\n    <div class=\"section-eyebrow\">Step 2 of 2<\u002Fdiv>\n    <h2>Process timeline<\u002Fh2>\n    <p class=\"section-intro\">What happens after you submit, how long each stage takes, and where delays occur.<\u002Fp>\n\n    <div class=\"tl-intro-note\">\n      When everything is prepared and submitted correctly, approval takes <strong>as little as 3–4 weeks from submission to data access.<\u002Fstrong> The preparation phase is the variable; it can take weeks or months depending on your institution's IRB and agreement-signing timelines.\n    <\u002Fdiv>\n\n    <!-- Stage 1 -->\n    <div class=\"tl-stage\">\n      <div class=\"tl-spine\"><div class=\"tl-dot tl-dot-blue\"><\u002Fdiv><div class=\"tl-line\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"tl-body\">\n        <div class=\"stage-card\">\n          <div class=\"stage-eyebrow\">Stage 1<\u002Fdiv>\n          <div class=\"stage-title\">Pre-application preparation<\u002Fdiv>\n          <div class=\"stage-time\">Weeks to months; begin this before anything else<\u002Fdiv>\n          <div class=\"stage-desc\">Gather all required materials: IRB approval letter (with 6+ months before expiry), full IRB protocol, signed <a href=\"https://niagads.scrollhelp.site/support/documents#Documents-DataDistributionAgreement\" target=\"_blank\" rel=\"noopener\">Data Distribution Agreement (DDA)<\u002Fa>, signed <a href=\"https://www.nia.nih.gov/research/dn/alzheimers-disease-genomics-sharing-plan\" target=\"_blank\" rel=\"noopener\">NIA AD Genomics Sharing Plan<\u002Fa>, and an institutionally signed <a href=\"https://niagads.scrollhelp.site/support/documents#Documents-DSSDataTransferAgreement\" target=\"_blank\" rel=\"noopener\">DTA<\u002Fa> ready to email. Identify all internal collaborators including everyone who will have access to the data.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tl-callout tl-callout-critical\"><strong>IRB takes time.<\u002Fstrong> Your institution may take weeks or months to issue approval. Begin this process first before gathering other documents.<\u002Fdiv>\n        <div class=\"tl-callout tl-callout-critical\"><strong>List all future downloaders now.<\u002Fstrong> Downloaders cannot be added after approval unless they were listed as <strong>internal collaborators<\u002Fstrong> at submission. Adding internal collaborators after approval will require DAR renewal. This policy cannot be waived. <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-gap\"><\u002Fdiv>\n\n    <!-- Stage 2 -->\n    <div class=\"tl-stage\">\n      <div class=\"tl-spine\"><div class=\"tl-dot tl-dot-blue\"><\u002Fdiv><div class=\"tl-line\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"tl-body\">\n        <div class=\"stage-card\">\n          <div class=\"stage-eyebrow\">Stage 2<\u002Fdiv>\n          <div class=\"stage-title\">Submit DAR in DARM + email the DTA simultaneously<\u002Fdiv>\n          <div class=\"stage-time\">One-time action: two things must happen on the same day<\u002Fdiv>\n          <div class=\"stage-desc\">Log in at <a href=\"https://dss.niagads.org/login/\" target=\"_blank\" rel=\"noopener\">dss.niagads.org/login<\u002Fa> and complete the application. Upload your IRB approval, IRB protocol, DDA, and NIA AD Genomics Sharing Plan directly in DARM.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tl-callout tl-callout-info\"><strong>On the same day:<\u002Fstrong> Email your signed DTA to <a href=\"mailto:niagads@pennmedicine.upenn.edu\" target=\"_blank\" rel=\"noopener\">niagads@pennmedicine.upenn.edu<\u002Fa> for Penn to countersign. The DTA is not submitted through DARM. It is sent by email in parallel. A fully executed DTA is required before your DAR can be approved.<\u002Fdiv>\n        <div class=\"tl-callout tl-callout-advisory\"><strong>Missing DTA: the most common final-stage delay.<\u002Fstrong> If you forget to email the DTA, your application can complete every review stage and then sit in final approval, waiting for countersignatures. Email it the same day you submit.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-gap\"><\u002Fdiv>\n\n    <!-- Stage 3 -->\n    <div class=\"tl-stage\">\n      <div class=\"tl-spine\"><div class=\"tl-dot tl-dot-blue\"><\u002Fdiv><div class=\"tl-line\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"tl-body\">\n        <div class=\"stage-card\">\n          <div class=\"stage-eyebrow\">Stage 3<\u002Fdiv>\n          <div class=\"stage-title\">NIAGADS administrative review<\u002Fdiv>\n          <div class=\"stage-time\">3–5 business days<\u002Fdiv>\n          <div class=\"stage-desc\">NIAGADS staff reviews your submission for completeness including all documents present, all fields filled, and institutional email addresses. If complete, it advances to your Signing Official for institutional sign-off.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tl-callout tl-callout-critical\"><strong>Incomplete submissions are returned.<\u002Fstrong> Missing documents restart the review process. Complete the checklist above before submitting.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-gap\"><\u002Fdiv>\n\n    <!-- Stage 4 -->\n    <div class=\"tl-stage\">\n      <div class=\"tl-spine\"><div class=\"tl-dot tl-dot-blue\"><\u002Fdiv><div class=\"tl-line\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"tl-body\">\n        <div class=\"stage-card\">\n          <div class=\"stage-eyebrow\">Stage 4<\u002Fdiv>\n          <div class=\"stage-title\">Signing Official (SO) approval<\u002Fdiv>\n          <div class=\"stage-time\">Variable: up to your SO's availability<\u002Fdiv>\n          <div class=\"stage-desc\">Your SO receives a notification using the email you provided to review and approve the application in DARM. The timing of this step depends on your SO's schedule and is the most time-varied stage in the process.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tl-callout tl-callout-critical\"><strong>Contact your SO before you submit.<\u002Fstrong> An SO who is traveling, unaware, or slow to respond can add significant unplanned delay. A quick email before submission can save weeks.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-gap\"><\u002Fdiv>\n\n    <!-- Stage 5 -->\n    <div class=\"tl-stage\">\n      <div class=\"tl-spine\"><div class=\"tl-dot tl-dot-blue\"><\u002Fdiv><div class=\"tl-line\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"tl-body\">\n        <div class=\"stage-card\">\n          <div class=\"stage-eyebrow\">Stage 5<\u002Fdiv>\n          <div class=\"stage-title\">NADAC committee review<\u002Fdiv>\n          <div class=\"stage-time\">5–10 business days<\u002Fdiv>\n          <div class=\"stage-desc\">The NIAGADS ADRD Data Access Committee (NADAC) reviews your Research Use Statement and IRB protocol to confirm the proposed research is consistent with the data use limitations for the requested datasets. <\u002Fdiv>\n        <\u002Fdiv>\n\t\t<div class=\"tl-callout tl-callout-critical\"><strong>The NIAGADS Data Use Committee (DUC) reviews your secondary return plan.<\u002Fstrong> In parallel to the NADAC review, the DUC ensures you provide an adequate derived/secondary return plan.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-gap\"><\u002Fdiv>\n\n    <!-- Stage 6 -->\n     <div class=\"tl-stage\">\n      <div class=\"tl-spine\"><div class=\"tl-dot tl-dot-blue\"><\u002Fdiv><div class=\"tl-line\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"tl-body\">\n        <div class=\"stage-card\">\n          <div class=\"stage-eyebrow\">Stage 6<\u002Fdiv>\n          <div class=\"stage-title\">Final Review<\u002Fdiv>\n          <div class=\"stage-time\">1+ business days<\u002Fdiv>\n          <div class=\"stage-desc\">The NIAGADS admin will conduct a final review of the DAR and confirm that a fully executed DTA has been received. Once complete, approval is granted.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-gap\"><\u002Fdiv>\n\n    <!-- Stage 7 -->\n    <div class=\"tl-stage\">\n      <div class=\"tl-spine\"><div class=\"tl-dot tl-dot-blue\"><\u002Fdiv><div class=\"tl-line-none\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"tl-body\">\n        <div class=\"stage-card\">\n          <div class=\"stage-eyebrow\">Stage 7: Approval<\u002Fdiv>\n          <div class=\"stage-title\">Data access<\u002Fdiv>\n          <div class=\"stage-time\">Portal files visible immediately · S3 access within 24 hours of approval (or AWS profile setup)<\u002Fdiv>\n          <div class=\"stage-desc\">Upon approval, your requested files appear in the DSS portal. S3 download permissions (required for files over 5 GB) are processed overnight, up to 24 hours after you save your AWS Canonical ID in your DSS profile.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tl-callout tl-callout-info\"><strong>Set up your AWS profile before approval.<\u002Fstrong> You can add your AWS Canonical ID to your DSS profile at any time, even before your DAR is approved. If you wait until after approval, you lose an additional overnight cycle. Do it before approval so permissions activate automatically once approved.<\u002Fdiv>\n        <div class=\"tl-callout tl-callout-info\"><strong>AWS setup in brief:<\u002Fstrong> Log into DSS → My Profile → enter your AWS Canonical ID. Then configure the AWS CLI with <code>aws configure<\u002Fcode>. Full instructions on the <a href=\"https://niagads.scrollhelp.site/support/amazon-instructions\" target=\"_blank\" rel=\"noopener\">Amazon Instructions<\u002Fa> page.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-gap\"><\u002Fdiv>\n  <\u002Fdiv><!-- /timeline section -->\n\n\n  <!-- ══════════════════════════════════════════════\n       SECTION 3: COMMON RETURN REASONS\n  ══════════════════════════════════════════════ -->\n  <div class=\"section-wrap\" id=\"return-reasons\">\n    <div class=\"section-eyebrow\">Reference<\u002Fdiv>\n    <h2>Common return reasons<\u002Fh2>\n    <p class=\"section-intro\">These are the most frequent reasons a Data Access Request is returned before review.<\u002Fp>\n\n    <div class=\"view-toggle\">\n      <span class=\"view-toggle-label\">View<\u002Fspan>\n      <div class=\"seg\">\n        <button type=\"button\" class=\"seg-btn\" data-mode=\"accordion\">Compact<\u002Fbutton>\n        <button type=\"button\" class=\"seg-btn\" data-mode=\"expanded\">Expanded<\u002Fbutton>\n      <\u002Fdiv>\n      <button type=\"button\" class=\"expand-all\" id=\"expandAll\">Expand all<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"reason-consequence\">\n      <strong>What \"returned\" means:<\u002Fstrong> when a submission is returned, it is removed from review and sent back to the applicant. The applicant must correct the issue, resubmit, and the full review process restarts.\n    <\u002Fdiv>\n\n    <!-- Category 1: IRB -->\n    <div class=\"reason-cat\">\n      <div class=\"reason-cat-header\"><span>1 — IRB documentation problems<\u002Fspan><a class=\"reason-cat-link\" href=\"#grp-irb\" target=\"_blank\" rel=\"noopener\">↑ Checklist: IRB documentation<\u002Fa><\u002Fdiv>\n\n      <div class=\"reason\">\n        <div class=\"reason-icon\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 9 9\" fill=\"none\"><path d=\"M4.5 1.5v3.5M4.5 7v.5\" stroke=\"#162F44\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"reason-title\">IRB protocol not submitted<\u002Fdiv>\n          <div class=\"reason-desc\">Applicants upload the IRB approval letter but not the IRB protocol, which is the full application and/or any documentation submitted to their institution's IRB that led to the determination. These are two separate documents and both are required.<\u002Fdiv>\n          <div class=\"reason-fix\"><strong>Fix:<\u002Fstrong> obtain the complete protocol document from your institution's IRB office. Upload both the approval letter and the full protocol when you submit your DAR.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reason\">\n        <div class=\"reason-icon\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 9 9\" fill=\"none\"><path d=\"M4.5 1.5v3.5M4.5 7v.5\" stroke=\"#162F44\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"reason-title\">IRB approval letter is expiring too soon<\u002Fdiv>\n          <div class=\"reason-desc\">The IRB approval letter must have at least 6 months remaining before its expiration date at the time of submission. While letters expiring sooner than that are accepted, data access expiration will be set to the date of IRB expiration and a renewal with updated IRB approval will be required.<\u002Fdiv>\n          <div class=\"reason-fix\"><strong>Fix:<\u002Fstrong> check the expiration date on your IRB approval letter before submitting. If it has fewer than 6 months remaining, renew it with your IRB office first if possible.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reason\">\n        <div class=\"reason-icon\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 9 9\" fill=\"none\"><path d=\"M4.5 1.5v3.5M4.5 7v.5\" stroke=\"#162F44\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"reason-title\">IRB documents are not in English without translation<\u002Fdiv>\n          <div class=\"reason-desc\">All application documents must be provided in English. For institutions where English is not the primary language, translations must accompany the original documents and be signed by the institutional signing official.<\u002Fdiv>\n          <div class=\"reason-fix\"><strong>Fix:<\u002Fstrong> provide a certified translation of any non-English documents alongside the originals. The translation must be signed by your SO.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Category 2: Required documents -->\n    <div class=\"reason-cat\">\n      <div class=\"reason-cat-header\"><span>2 — Missing or incomplete required documents<\u002Fspan><a class=\"reason-cat-link\" href=\"#grp-docs\" target=\"_blank\" rel=\"noopener\">↑ Checklist: Required documentation<\u002Fa><\u002Fdiv>\n\n      <div class=\"reason\">\n        <div class=\"reason-icon\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 9 9\" fill=\"none\"><path d=\"M4.5 1.5v3.5M4.5 7v.5\" stroke=\"#162F44\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"reason-title\">DTA not emailed, or emailed late<\u002Fdiv>\n          <div class=\"reason-desc\">The Data Transfer Agreement is not submitted through DARM. It must be emailed separately to niagads@pennmedicine.upenn.edu for Penn to countersign, in parallel with your DAR submission. If the DTA is missing, your application can progress through all review stages and then stall indefinitely at final approval until all required signatures are complete.<\u002Fdiv>\n          <div class=\"reason-fix\"><strong>Fix:<\u002Fstrong> email your signed DTA on the same day you submit your DAR in DARM. Do not wait until after submission.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reason\">\n        <div class=\"reason-icon\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 9 9\" fill=\"none\"><path d=\"M4.5 1.5v3.5M4.5 7v.5\" stroke=\"#162F44\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"reason-title\">DDA or NIA AD Genomics Sharing Plan is incomplete or unsigned<\u002Fdiv>\n          <div class=\"reason-desc\">Both the NIAGADS Data Distribution Agreement (DDA) and the NIA AD Genomics Sharing Plan must be fully completed and signed by both the PI and the Signing Official before upload. Common issues include missing the \"whereas\" section on DDA page 2, blank grant fields on the Sharing Plan page 5, or missing one of the two required signatures.<\u002Fdiv>\n          <div class=\"reason-fix\"><strong>Fix:<\u002Fstrong> review both documents carefully before uploading. DDA: complete page 2 \"whereas\" section with PI name + institution, PI + SO sign page 5. Sharing Plan: complete page 5 grant info (write \"n/a\" if no grant), PI + SO sign page 7.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Category 3: Personnel -->\n    <div class=\"reason-cat\">\n      <div class=\"reason-cat-header\"><span>3 — Personnel and role problems<\u002Fspan><a class=\"reason-cat-link\" href=\"#grp-investigator\" target=\"_blank\" rel=\"noopener\">↑ Checklist: Investigator qualifications<\u002Fa><\u002Fdiv>\n\n      <div class=\"reason\">\n        <div class=\"reason-icon\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 9 9\" fill=\"none\"><path d=\"M4.5 1.5v3.5M4.5 7v.5\" stroke=\"#162F44\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"reason-title\">PI, SO, or IT Director roles are not held by three separate people<\u002Fdiv>\n          <div class=\"reason-desc\">The Principal Investigator, Signing Official, and IT Director must be three different individuals. Any overlap, such as PI = SO, PI = IT Director, or SO = IT Director, results in automatic rejection.<\u002Fdiv>\n          <div class=\"reason-fix\"><strong>Fix:<\u002Fstrong> identify three separate people before you begin your application. The SO is typically in your Office of Sponsored Research. The IT Director should be someone with authority to ensure NIH security requirements are followed.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reason\">\n        <div class=\"reason-icon\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 9 9\" fill=\"none\"><path d=\"M4.5 1.5v3.5M4.5 7v.5\" stroke=\"#162F44\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"reason-title\">The SO's eRA Commons ID is incorrect<\u002Fdiv>\n          <div class=\"reason-desc\">The eRA Commons ID provided for the Signing Official does not match institutional records, or belongs to a different person than the one listed as SO on the application. This is a common data-entry error that is easy to overlook before submitting.<\u002Fdiv>\n          <div class=\"reason-fix\"><strong>Fix:<\u002Fstrong> confirm your SO's eRA Commons ID directly with them, or with your Office of Sponsored Research, before entering it in DARM.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reason\">\n        <div class=\"reason-icon\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 9 9\" fill=\"none\"><path d=\"M4.5 1.5v3.5M4.5 7v.5\" stroke=\"#162F44\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"reason-title\">Applicant is not a qualifying PI<\u002Fdiv>\n          <div class=\"reason-desc\">Only permanent employees at the level of assistant professor, associate professor, full professor, or senior scientist may submit a DAR. Graduate students, postdoctoral fellows, trainees, and other laboratory staff are not permitted to submit, regardless of their involvement in the research.<\u002Fdiv>\n          <div class=\"reason-fix\"><strong>Fix:<\u002Fstrong> a qualifying PI must initiate and submit the application. Lab staff and trainees can be listed as internal collaborators but cannot be the applicant.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reason\">\n        <div class=\"reason-icon\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 9 9\" fill=\"none\"><path d=\"M4.5 1.5v3.5M4.5 7v.5\" stroke=\"#162F44\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"reason-title\">Free email addresses used for any personnel<\u002Fdiv>\n          <div class=\"reason-desc\">Applications that include Gmail, Yahoo, Hotmail, or any other free email provider address for the PI, SO, IT Director, or any internal collaborator are returned without review.<\u002Fdiv>\n          <div class=\"reason-fix\"><strong>Fix:<\u002Fstrong> all email addresses in the application must be institutional addresses (e.g. @university.edu, @hospital.org). Verify every person's email before submitting.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Category 4: Post-approval / access -->\n    <div class=\"reason-cat\">\n      <div class=\"reason-cat-header\">4 — Issues with data and access<\u002Fdiv>\n\n      <div class=\"reason\">\n        <div class=\"reason-icon\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 9 9\" fill=\"none\"><path d=\"M4.5 1.5v3.5M4.5 7v.5\" stroke=\"#162F44\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"reason-title\">A requested dataset is not showing up<\u002Fdiv>\n          <div class=\"reason-desc\">Applicants sometimes apply for the wrong dataset, or do not realize a related dataset they need is separate and must be requested individually. A dataset that does not appear after approval is often a sign the application did not include it in the first place.<\u002Fdiv>\n          <div class=\"reason-fix\"><strong>Fix:<\u002Fstrong> before submitting, confirm you are applying for the correct dataset(s) for your research. Review the dataset descriptions carefully, and if you are unsure which datasets you need, contact NIAGADS support before you apply rather than after approval.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reason\">\n        <div class=\"reason-icon\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 9 9\" fill=\"none\"><path d=\"M4.5 1.5v3.5M4.5 7v.5\" stroke=\"#162F44\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"reason-title\">Attempting to add a downloader who was not listed as an internal collaborator<\u002Fdiv>\n          <div class=\"reason-desc\">After a DAR is approved, new personnel can only be added as downloaders if they were listed as internal collaborators at the time of original submission. This is the most common post-approval frustration. The policy cannot be waived.<\u002Fdiv>\n          <div class=\"reason-fix\"><strong>Fix:<\u002Fstrong> before submitting, think ahead. List everyone who may need to access or download data at any point during the project, even if they will not need access immediately. <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"reason\">\n        <div class=\"reason-icon\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 9 9\" fill=\"none\"><path d=\"M4.5 1.5v3.5M4.5 7v.5\" stroke=\"#162F44\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"reason-title\">S3 access not available immediately after approval<\u002Fdiv>\n          <div class=\"reason-desc\">This is not a rejection, but it is a frequent source of confusion. Upon approval, files are visible in the DSS portal, but S3 download permissions (required for files over 5GB) take up to 24 hours to activate after you save your AWS Canonical ID in your DSS profile. If you wait until after approval to set up your AWS profile, you lose an additional overnight processing cycle.<\u002Fdiv>\n          <div class=\"reason-fix\"><strong>Fix:<\u002Fstrong> add your AWS Canonical ID to your DSS profile before your DAR is approved. Log in → My Profile → enter your Canonical ID. Permissions will activate automatically once your DAR is approved. Full setup instructions are on the <a href=\"https://niagads.scrollhelp.site/support/amazon-instructions\" target=\"_blank\" rel=\"noopener\">Amazon Instructions<\u002Fa> page.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv><!-- /return-reasons section -->\n\n  <footer class=\"page-footer\">\n    <a href=\"https://dss.niagads.org/login\" target=\"_blank\" rel=\"noopener\">Log into DARM<\u002Fa> &nbsp;·&nbsp;\n    <a href=\"https://niagads.scrollhelp.site/support/application-instructions\" target=\"_blank\" rel=\"noopener\">Full application instructions<\u002Fa> &nbsp;·&nbsp;\n    <a href=\"https://niagads.scrollhelp.site/support/contact-our-support-team\" target=\"_blank\" rel=\"noopener\">Contact support<\u002Fa>\n  <\u002Ffooter>\n\n<\u002Fdiv><!-- /page -->\n\n<script>\n(function () {\n  var STORAGE_KEY = 'niagads-dar-checklist-v6';\n  if (window.NodeList && !NodeList.prototype.forEach) {\n    NodeList.prototype.forEach = Array.prototype.forEach;\n  }\n  var items = Array.prototype.slice.call(document.querySelectorAll('.item'));\n  var TOTAL = items.length;\n  var groups = Array.prototype.slice.call(document.querySelectorAll('.cl-group'));\n  var pb = document.getElementById('pb');\n  var pl = document.getElementById('pl');\n  var banner = document.getElementById('ready-banner');\n\n  items.forEach(function (el, i) { el.dataset.k = 'i' + i; });\n\n  function loadState() {\n    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }\n    catch (e) { return {}; }\n  }\n  function saveState() {\n    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}\n  }\n  var state = loadState();\n\n  function refresh() {\n    var done = 0;\n    items.forEach(function (el) { if (el.classList.contains('done')) done++; });\n    pb.style.width = Math.round(done / TOTAL * 100) + '%';\n    pl.textContent = done + ' of ' + TOTAL;\n    banner.style.display = (done === TOTAL) ? 'block' : 'none';\n    groups.forEach(function (g) {\n      var gi = g.querySelectorAll('.item');\n      var gd = 0;\n      gi.forEach(function (el) { if (el.classList.contains('done')) gd++; });\n      var c = g.querySelector('.cl-group-count');\n      if (c) c.textContent = gd + ' / ' + gi.length;\n      g.classList.toggle('group-done', gi.length > 0 && gd === gi.length);\n    });\n  }\n\n  items.forEach(function (el) { if (state[el.dataset.k]) el.classList.add('done'); });\n  refresh();\n\n  window.toggle = function (el) {\n    el.classList.toggle('done');\n    state[el.dataset.k] = el.classList.contains('done');\n    saveState();\n    refresh();\n  };\n\n  /* ----- Save / Export: print-ready copy of just the checklist, with checks kept ----- */\n  var exportBtn = document.getElementById('exportBtn');\n  if (exportBtn) exportBtn.addEventListener('click', function () {\n    var src = document.getElementById('checklist');\n    var clone = src.cloneNode(true);\n\n    // Strip everything that isn't the checklist itself.\n    clone.querySelectorAll(\n      '.section-eyebrow, .section-intro, .progress-row, .leadtime-callout, .callout, .export-btn'\n    ).forEach(function (n) { n.remove(); });\n    clone.querySelectorAll('.item').forEach(function (el) { el.removeAttribute('onclick'); });\n\n    var done = 0;\n    var itemsC = clone.querySelectorAll('.item');\n    itemsC.forEach(function (el) { if (el.classList.contains('done')) done++; });\n\n    var now = new Date();\n    var dateStr = now.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });\n    var title = 'NIAGADS DAR Checklist — ' + now.toISOString().slice(0, 10);\n\n    var css =\n      \"@import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap');\" +\n      \"*{box-sizing:border-box;margin:0;padding:0;}\" +\n      \"body{font-family:'Lato',Arial,sans-serif;color:#263238;line-height:1.55;max-width:720px;margin:0 auto;padding:36px 28px 48px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}\" +\n      \".ex-head{border-bottom:2px solid #162F44;padding-bottom:16px;margin-bottom:26px;}\" +\n      \".ex-org{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#3D5263;margin-bottom:8px;}\" +\n      \".ex-title{font-size:24px;font-weight:300;color:#162F44;line-height:1.25;}\" +\n      \".ex-meta{font-size:12px;color:#6A8FA7;margin-top:10px;}\" +\n      \".ex-meta b{color:#162F44;font-weight:700;}\" +\n      \".cl-group{margin-bottom:22px;break-inside:avoid;}\" +\n      \".cl-group-header{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:700;color:#162F44;padding-bottom:6px;border-bottom:1px solid #D8DEE3;margin-bottom:2px;}\" +\n      \".cl-group-count{font-size:11px;font-weight:700;color:#A7B1BA;}\" +\n      \".item{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #EBF0F4;break-inside:avoid;}\" +\n      \".item .cb{display:none;}\" +\n      \".item::before{content:'\\\\2610';font-size:17px;line-height:1.15;color:#A7B1BA;flex:0 0 auto;}\" +\n      \".item.done::before{content:'\\\\2611';color:#162F44;}\" +\n      \".lbl{flex:1;}\" +\n      \".lbl-main{font-size:14px;font-weight:700;color:#263238;}\" +\n      \".lbl-main a{color:#263238;text-decoration:underline;}\" +\n      \".lbl-sub{font-size:12px;color:#6A8FA7;margin-top:3px;}\" +\n      \".lbl-sub a{color:#6A8FA7;}\" +\n      \".badge{flex:0 0 auto;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#5C3D00;background:#FDF3E3;border:1px solid #F1B154;border-radius:2px;padding:2px 6px;height:fit-content;margin-top:1px;}\" +\n      \"@media print{body{padding:0 8px;} .ex-print-hint{display:none;}}\" +\n      \".ex-print-hint{margin-top:28px;padding-top:14px;border-top:1px solid #D8DEE3;font-size:11px;color:#A7B1BA;}\";\n\n    var head =\n      '<div class=\"ex-head\">' +\n        '<div class=\"ex-org\">NIAGADS Data Sharing Service<\u002Fdiv>' +\n        '<div class=\"ex-title\">DAR Pre-application Checklist<\u002Fdiv>' +\n        '<div class=\"ex-meta\"><b>' + done + ' of ' + itemsC.length + '<\u002Fb> items complete &nbsp;·&nbsp; Saved ' + dateStr + '<\u002Fdiv>' +\n      '<\u002Fdiv>';\n\n    var hint = '<div class=\"ex-print-hint\">This is a saved snapshot of your checklist progress. Use your browser&rsquo;s Print dialog to save it as a PDF.<\u002Fdiv>';\n\n    var w = window.open('', '_blank');\n    if (!w) { window.print(); return; }\n    w.document.open();\n    w.document.write(\n      '<!doctype html><html lang=\"en\"><head><meta charset=\"utf-8\">' +\n      '<title>' + title + '<\u002Ftitle><style>' + css + '<\u002Fstyle><\u002Fhead>' +\n      '<body>' + head + clone.innerHTML + hint + '<\u002Fbody><\u002Fhtml>'\n    );\n    w.document.close();\n    w.focus();\n    var fire = function () { try { w.print(); } catch (e) {} };\n    if (w.document.readyState === 'complete') setTimeout(fire, 350);\n    else w.onload = function () { setTimeout(fire, 350); };\n  });\n\n  /* ----- Return-reasons view toggle + accordion ----- */\n  var reasonsSection = document.getElementById('return-reasons');\n  if (reasonsSection) {\n    var VIEW_KEY = 'niagads-dar-reasons-view';\n    var reasons = Array.prototype.slice.call(reasonsSection.querySelectorAll('.reason'));\n    var segBtns = Array.prototype.slice.call(reasonsSection.querySelectorAll('.seg-btn'));\n    var expandAllBtn = document.getElementById('expandAll');\n\n    function setExpandAllLabel() {\n      if (!expandAllBtn) return;\n      var anyClosed = reasons.some(function (r) { return !r.classList.contains('reason-open'); });\n      expandAllBtn.textContent = anyClosed ? 'Expand all' : 'Collapse all';\n    }\n\n    function applyMode(mode) {\n      var accordion = mode === 'accordion';\n      reasonsSection.classList.toggle('reasons-accordion', accordion);\n      segBtns.forEach(function (b) { b.classList.toggle('active', b.dataset.mode === mode); });\n      if (expandAllBtn) expandAllBtn.hidden = !accordion;\n      setExpandAllLabel();\n      try { localStorage.setItem(VIEW_KEY, mode); } catch (e) {}\n    }\n\n    reasons.forEach(function (r) {\n      var title = r.querySelector('.reason-title');\n      if (title) title.addEventListener('click', function () {\n        if (!reasonsSection.classList.contains('reasons-accordion')) return;\n        r.classList.toggle('reason-open');\n        setExpandAllLabel();\n      });\n    });\n\n    segBtns.forEach(function (b) {\n      b.addEventListener('click', function () { applyMode(b.dataset.mode); });\n    });\n\n    if (expandAllBtn) expandAllBtn.addEventListener('click', function () {\n      var anyClosed = reasons.some(function (r) { return !r.classList.contains('reason-open'); });\n      reasons.forEach(function (r) { r.classList.toggle('reason-open', anyClosed); });\n      setExpandAllLabel();\n    });\n\n    var savedView = 'accordion';\n    try { savedView = localStorage.getItem(VIEW_KEY) || 'accordion'; } catch (e) {}\n    applyMode(savedView);\n  }\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
