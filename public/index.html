  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>NIAGADS DSS Data Access Request (DAR) Guide<\u002Ftitle>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* latin-ext */\n@font-face {\n  font-family: 'Lato';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"3b428efd-889a-4bd1-b69e-0d868d8da35d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lato';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"ffddf19d-a150-4855-a56c-a0c2e7d67fcf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lato';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"80c484f0-7f10-4072-8a44-e1324ebe7767\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lato';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"3a9dae6e-32ff-494e-ac77-a04a9bb64586\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lato';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"359db1d5-239d-4008-a4a5-8f66a1597d97\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lato';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"cc5ccdf2-16ad-4d12-910d-c78d014f43a4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n\n/* ── Logo ── */\n.site-logo {\n  height: 44px;\n  width: auto;\n  display: block;\n  margin-bottom: 1.25rem;\n}\n\n/* ── Logo ── */\n.site-logo {\n  height: 46px;\n  width: auto;\n  display: block;\n  margin-bottom: 1.25rem;\n}\n.logo-link { display: inline-block; }\n.logo-link:hover { opacity: .8; transition: opacity .12s; }\n/* ── Reset ── */\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n/* ── NIAGADS tokens ── */\n:root {\n  --navy:    #162F44;\n  --blue:    #3D5263;\n  --gold:    #F1B154;\n  --white:   #FFFFFF;\n  --bg:      #F5F7F8;\n  --border:  #D8DEE3;\n  --text:    #263238;\n  --muted:   #6A8FA7;\n  --teal:    #4B7F87;\n  --gray:    #A7B1BA;\n  --pale-gold: #FDF3E3;\n  --pale-navy: #EBF0F4;\n}\n\n/* ── Base ── */\nbody {\n  font-family: 'Lato', -apple-system, Helvetica, Arial, sans-serif;\n  font-size: 15px;\n  line-height: 1.6;\n  color: var(--text);\n  background: var(--bg);\n  padding: 2.5rem 1rem 5rem;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* ── Page container ── */\n.page { max-width: 720px; margin: 0 auto; }\n\n/* ══════════════════════════════════════\n   HEADER\n══════════════════════════════════════ */\n.site-header {\n  margin-bottom: 2.5rem;\n  padding-bottom: 2rem;\n  border-bottom: 1px solid var(--border);\n}\n.site-header .org {\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--blue);\n  margin-bottom: 10px;\n}\n.site-header h1 {\n  font-size: 28px;\n  font-weight: 300;\n  color: var(--navy);\n  line-height: 1.2;\n  margin-bottom: 10px;\n  letter-spacing: -.01em;\n}\n.site-header h1 strong {\n  font-weight: 700;\n}\n.site-header .tagline {\n  font-size: 14px;\n  color: #556070;\n  max-width: 560px;\n  line-height: 1.7;\n}\n.tagline .accent {\n  color: var(--teal);\n  font-weight: 700;\n}\n\n/* ══════════════════════════════════════\n   NAV PILLS\n══════════════════════════════════════ */\n.nav {\n  display: flex;\n  gap: 8px;\n  flex-wrap: wrap;\n  margin-bottom: 2.5rem;\n}\n.nav a {\n  text-decoration: none;\n  font-size: 12.5px;\n  font-weight: 700;\n  letter-spacing: .03em;\n  padding: 6px 16px;\n  border-radius: 2px;\n  border: 1px solid var(--border);\n  color: var(--blue);\n  background: var(--white);\n  transition: background .12s, border-color .12s;\n}\n.nav a:hover {\n  background: var(--pale-navy);\n  border-color: var(--blue);\n}\n\n/* ══════════════════════════════════════\n   SECTION CARDS\n══════════════════════════════════════ */\n.section-wrap {\n  background: var(--white);\n  border: 1px solid var(--border);\n  border-top: 3px solid var(--blue);\n  border-radius: 0 0 4px 4px;\n  padding: 1.75rem 2rem 2rem;\n  margin-bottom: 1.75rem;\n}\n.section-eyebrow {\n  font-size: 10.5px;\n  font-weight: 700;\n  letter-spacing: .1em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 5px;\n}\n.section-wrap > h2 {\n  font-size: 18px;\n  font-weight: 700;\n  color: var(--navy);\n  margin-bottom: 8px;\n}\n.section-intro {\n  font-size: 13.5px;\n  color: #556070;\n  line-height: 1.65;\n  margin-bottom: 1.5rem;\n  padding-bottom: 1.25rem;\n  border-bottom: 1px solid var(--border);\n}\n\n/* ══════════════════════════════════════\n   PROGRESS BAR\n══════════════════════════════════════ */\n.progress-row {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  margin-bottom: 1.75rem;\n}\n.progress-track {\n  flex: 1;\n  height: 4px;\n  background: var(--border);\n  border-radius: 2px;\n  overflow: hidden;\n}\n.progress-fill {\n  height: 100%;\n  width: 0%;\n  background: var(--blue);\n  border-radius: 2px;\n  transition: width .3s ease;\n}\n.progress-label {\n  font-size: 12px;\n  font-weight: 700;\n  color: var(--gray);\n  min-width: 56px;\n  text-align: right;\n}\n.export-btn {\n  font: inherit;\n  font-size: 12px;\n  font-weight: 700;\n  color: var(--white);\n  background: var(--blue);\n  border: none;\n  border-radius: 3px;\n  padding: 7px 14px;\n  cursor: pointer;\n  white-space: nowrap;\n  transition: background .12s;\n}\n.export-btn:hover { background: var(--navy); }\n\n/* ══════════════════════════════════════\n   CHECKLIST GROUPS\n══════════════════════════════════════ */\n.cl-group { margin-bottom: 1.75rem; }\n.cl-group:last-of-type { margin-bottom: 0; }\n\n.cl-group-header {\n  font-size: 10.5px;\n  font-weight: 700;\n  letter-spacing: .1em;\n  text-transform: uppercase;\n  color: var(--blue);\n  padding-bottom: 8px;\n  border-bottom: 1px solid var(--border);\n  margin-bottom: 2px;\n}\n\n/* ══════════════════════════════════════\n   CHECKLIST ITEMS\n══════════════════════════════════════ */\n.item {\n  display: flex;\n  align-items: flex-start;\n  gap: 11px;\n  padding: 11px 6px;\n  border-bottom: 1px solid var(--bg);\n  cursor: pointer;\n  -webkit-user-select: none;\n  user-select: none;\n  border-radius: 3px;\n  transition: background .1s;\n}\n.item:last-of-type { border-bottom: none; }\n.item:hover { background: var(--bg); }\n\n.cb {\n  width: 18px;\n  height: 18px;\n  border: 1.5px solid var(--border);\n  border-radius: 2px;\n  flex-shrink: 0;\n  margin-top: 2px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  background: var(--white);\n  transition: all .15s;\n}\n.cb svg { display: none; }\n.item.done .cb { background: var(--blue); border-color: var(--blue); }\n.item.done .cb svg { display: block; }\n.item.done .lbl-main {\n  color: var(--gray);\n  text-decoration: line-through;\n  text-decoration-color: var(--border);\n}\n\n.lbl { flex: 1; }\n.lbl-main {\n  font-size: 13.5px;\n  color: var(--text);\n  transition: color .15s;\n  line-height: 1.5;\n}\n.lbl-sub {\n  font-size: 12px;\n  color: var(--gray);\n  margin-top: 3px;\n  line-height: 1.5;\n}\n\n.badge {\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: .05em;\n  text-transform: uppercase;\n  padding: 2px 8px;\n  border-radius: 2px;\n  flex-shrink: 0;\n  align-self: flex-start;\n  margin-top: 3px;\n  background: var(--blue);\n  color: var(--white);\n}\n\n/* ══════════════════════════════════════\n   CALLOUTS\n══════════════════════════════════════ */\n.callout {\n  margin: 3px 0 4px 29px;\n  padding: 9px 13px;\n  font-size: 12.5px;\n  line-height: 1.6;\n}\n/* Critical — deep navy */\n.callout-critical {\n  background: var(--pale-navy);\n  border-left: 3px solid var(--navy);\n  color: var(--navy);\n}\n/* Advisory — gold (use sparingly) */\n.callout-advisory {\n  background: var(--pale-gold);\n  border-left: 3px solid var(--gold);\n  color: #5C3D00;\n}\n/* Informational — blue */\n.callout-info {\n  background: var(--pale-navy);\n  border-left: 3px solid var(--blue);\n  color: var(--navy);\n}\n\n/* ══════════════════════════════════════\n   COMPLETION BANNER\n══════════════════════════════════════ */\n#ready-banner {\n  display: none;\n  margin-top: 1.5rem;\n  padding: 16px 18px;\n  border: 1px solid var(--gold);\n  border-left: 4px solid var(--gold);\n  background: var(--pale-gold);\n}\n#ready-banner .ready-title {\n  font-size: 14px;\n  font-weight: 700;\n  color: #5C3D00;\n  margin-bottom: 5px;\n}\n#ready-banner p {\n  font-size: 13px;\n  color: #5C3D00;\n  line-height: 1.65;\n}\n#ready-banner a { color: #3D2800; font-weight: 700; }\n#ready-banner code {\n  font-family: \"SF Mono\", \"Fira Code\", \"Courier New\", monospace;\n  font-size: 11.5px;\n  background: rgba(0,0,0,.06);\n  padding: 1px 5px;\n  border-radius: 2px;\n}\n\n/* ══════════════════════════════════════\n   TIMELINE\n══════════════════════════════════════ */\n.tl-intro-note {\n  font-size: 13px;\n  color: var(--navy);\n  line-height: 1.65;\n  background: var(--pale-navy);\n  border-left: 4px solid var(--blue);\n  padding: 12px 16px;\n  margin-bottom: 1.75rem;\n}\n.tl-intro-note strong { font-weight: 700; }\n\n.tl-stage {\n  display: grid;\n  grid-template-columns: 24px 1fr;\n  gap: 0 16px;\n  margin-bottom: 0;\n}\n.tl-spine {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n}\n.tl-dot {\n  width: 12px;\n  height: 12px;\n  border-radius: 50%;\n  flex-shrink: 0;\n  margin-top: 6px;\n  z-index: 1;\n}\n.tl-dot-blue  { background: var(--blue); }\n.tl-dot-navy  { background: var(--navy); }\n.tl-line      { flex: 1; width: 1px; background: var(--border); min-height: 14px; }\n.tl-line-none { flex: 1; min-height: 0; }\n\n.tl-body { padding-bottom: 0; }\n\n.stage-card {\n  background: var(--white);\n  border: 1px solid var(--border);\n  padding: 11px 14px;\n  margin-bottom: 6px;\n}\n.stage-card.is-final {\n  background: var(--pale-navy);\n  border-color: var(--blue);\n  border-left: 3px solid var(--navy);\n}\n\n.stage-eyebrow {\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 2px;\n}\n.stage-card.is-final .stage-eyebrow { color: var(--blue); }\n.stage-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 1px; }\n.stage-time   { font-size: 12px; color: var(--gray); margin-bottom: 6px; font-weight: 700; }\n.stage-desc   { font-size: 12.5px; color: var(--text); line-height: 1.55; }\n.stage-card.is-final .stage-title { color: var(--navy); }\n.stage-card.is-final .stage-time  { color: var(--blue); }\n\n.tl-callout {\n  margin-bottom: 6px;\n  padding: 9px 13px;\n  font-size: 12.5px;\n  line-height: 1.55;\n}\n.tl-callout-critical { background: var(--pale-navy); border-left: 3px solid var(--navy); color: var(--navy); }\n.tl-callout-advisory { background: var(--pale-gold);  border-left: 3px solid var(--gold); color: #5C3D00; }\n.tl-callout-info     { background: var(--pale-navy);  border-left: 3px solid var(--blue); color: var(--navy); }\n.tl-callout code {\n  font-family: \"SF Mono\", \"Fira Code\", \"Courier New\", monospace;\n  font-size: 11.5px;\n  background: rgba(0,0,0,.07);\n  padding: 1px 5px;\n  border-radius: 2px;\n}\n.tl-callout a { color: var(--navy); font-weight: 700; }\n.tl-callout strong { font-weight: 700; }\n.tl-gap { height: 10px; }\n\n/* ══════════════════════════════════════\n   FOOTER\n══════════════════════════════════════ */\n.page-footer {\n  margin-top: 2rem;\n  padding-top: 1.5rem;\n  border-top: 1px solid var(--border);\n  font-size: 12px;\n  color: var(--gray);\n  text-align: center;\n}\n.page-footer a { color: var(--blue); font-weight: 700; text-decoration: none; }\n.page-footer a:hover { text-decoration: underline; }\n\n/* ══════════════════════════════════════\n   HEADER META\n══════════════════════════════════════ */\n.header-meta {\n  margin-top: 14px;\n  font-size: 12.5px;\n  color: var(--navy);\n  background: var(--pale-navy);\n  border-left: 3px solid var(--blue);\n  padding: 9px 13px;\n  line-height: 1.6;\n}\n.header-meta strong { font-weight: 700; }\n\n/* ══════════════════════════════════════\n   ELIGIBILITY GATE\n══════════════════════════════════════ */\n.eligibility {\n  background: var(--navy);\n  border-radius: 4px;\n  padding: 1.5rem 1.75rem;\n  margin-bottom: 2rem;\n}\n.eligibility-eyebrow {\n  font-size: 10.5px;\n  font-weight: 700;\n  letter-spacing: .1em;\n  text-transform: uppercase;\n  color: var(--gold);\n  margin-bottom: 8px;\n}\n.eligibility-title {\n  font-size: 18px;\n  font-weight: 700;\n  color: var(--white);\n  margin-bottom: 7px;\n}\n.eligibility-sub {\n  font-size: 13px;\n  color: #C5D2DC;\n  line-height: 1.6;\n  margin-bottom: 1.15rem;\n}\n.eligibility-list { list-style: none; display: grid; gap: 11px; }\n.eligibility-list li {\n  position: relative;\n  padding-left: 18px;\n  font-size: 13px;\n  color: #E8EEF2;\n  line-height: 1.55;\n}\n.eligibility-list li::before {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  top: 8px;\n  width: 7px; height: 7px;\n  border-radius: 50%;\n  background: var(--gold);\n}\n.eligibility-list strong { color: var(--white); font-weight: 700; }\n.eligibility-note {\n  margin-top: 1.15rem;\n  padding-top: 1rem;\n  border-top: 1px solid rgba(255,255,255,.12);\n  font-size: 12px;\n  color: #A9B8C5;\n  line-height: 1.55;\n}\n\n/* ══════════════════════════════════════\n   LEAD-TIME CALLOUT\n══════════════════════════════════════ */\n.leadtime-callout {\n  background: var(--pale-gold);\n  border: 1px solid var(--gold);\n  border-left: 4px solid var(--gold);\n  padding: 13px 16px;\n  margin-bottom: 1.75rem;\n  font-size: 12.5px;\n  color: #5C3D00;\n  line-height: 1.6;\n}\n.leadtime-title { font-weight: 700; color: #3D2800; margin-bottom: 8px; font-size: 13px; }\n.leadtime-callout ul { list-style: none; display: grid; gap: 5px; margin-bottom: 8px; }\n.leadtime-callout li { padding-left: 17px; position: relative; }\n.leadtime-callout li::before { content: \"→\"; position: absolute; left: 0; color: var(--gold); font-weight: 700; }\n.leadtime-callout strong { font-weight: 700; color: #3D2800; }\n\n/* ══════════════════════════════════════\n   GROUP HEADER COUNT\n══════════════════════════════════════ */\n.cl-group-header {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 12px;\n}\n.cl-group-count {\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: .04em;\n  color: var(--gray);\n  background: var(--bg);\n  border: 1px solid var(--border);\n  border-radius: 10px;\n  padding: 1px 9px;\n  white-space: nowrap;\n  flex-shrink: 0;\n}\n.cl-group.group-done .cl-group-count {\n  color: var(--white);\n  background: var(--teal);\n  border-color: var(--teal);\n}\n\n/* Inline links inside checklist items */\n.lbl-main a, .lbl-sub a { color: var(--teal); font-weight: 700; text-decoration: none; border-bottom: 1px solid var(--border); }\n.lbl-main a:hover, .lbl-sub a:hover { border-bottom-color: var(--teal); }\n\n/* ══════════════════════════════════════\n   DOCUMENT MANIFEST\n══════════════════════════════════════ */\n.doc-manifest {\n  margin-top: 1.75rem;\n  border: 1px solid var(--border);\n  border-top: 3px solid var(--teal);\n  background: var(--white);\n}\n.doc-manifest-head { padding: 13px 16px 11px; border-bottom: 1px solid var(--border); }\n.doc-manifest-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 3px; }\n.doc-manifest-sub { font-size: 12px; color: #6A8FA7; line-height: 1.5; }\n.doc-row { display: flex; align-items: baseline; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--bg); font-size: 12.5px; }\n.doc-row:last-child { border-bottom: none; }\n.doc-name { color: var(--text); }\n.doc-row a { color: var(--teal); font-weight: 700; text-decoration: none; border-bottom: 1px solid var(--border); }\n.doc-where { margin-left: auto; font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); white-space: nowrap; flex-shrink: 0; }\n.doc-where.email { color: #5C3D00; }\n\n/* Return-reason → checklist link */\n.reason-cat-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }\n.reason-cat-link {\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0;\n  color: var(--teal);\n  text-decoration: none;\n  text-transform: none;\n  white-space: nowrap;\n  flex-shrink: 0;\n}\n.reason-cat-link:hover { text-decoration: underline; }\n\n/* ══════════════════════════════════════\n   PRINT\n══════════════════════════════════════ */\n/* ══════════════════════════════════════\n   RETURN REASONS\n══════════════════════════════════════ */\n.reason-stat-bar {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 10px;\n  margin-bottom: 1.75rem;\n}\n.reason-stat-box {\n  background: var(--pale-navy);\n  border: 1px solid var(--border);\n  border-top: 2px solid var(--blue);\n  padding: 12px 14px;\n  text-align: center;\n}\n.reason-stat-num {\n  font-size: 24px;\n  font-weight: 700;\n  color: var(--navy);\n  line-height: 1;\n  margin-bottom: 4px;\n}\n.reason-stat-label {\n  font-size: 11px;\n  color: var(--muted);\n  line-height: 1.4;\n}\n\n.reason-consequence {\n  background: var(--pale-gold);\n  border: 1px solid var(--gold);\n  border-left: 4px solid var(--gold);\n  padding: 12px 16px;\n  margin-bottom: 1.75rem;\n  font-size: 13px;\n  color: #5C3D00;\n  line-height: 1.65;\n}\n.reason-consequence strong { font-weight: 700; color: #3D2800; }\n\n.reason-cat { margin-bottom: 1.75rem; }\n.reason-cat:last-of-type { margin-bottom: 0; }\n.reason-cat-header {\n  font-size: 10.5px;\n  font-weight: 700;\n  letter-spacing: .1em;\n  text-transform: uppercase;\n  color: var(--blue);\n  padding-bottom: 8px;\n  border-bottom: 1px solid var(--border);\n  margin-bottom: 4px;\n}\n\n.reason {\n  display: grid;\n  grid-template-columns: 24px 1fr;\n  gap: 0 12px;\n  padding: 13px 0;\n  border-bottom: 1px solid var(--bg);\n}\n.reason:last-child { border-bottom: none; padding-bottom: 0; }\n.reason:first-child { padding-top: 10px; }\n\n.reason-icon {\n  width: 20px;\n  height: 20px;\n  border-radius: 50%;\n  background: var(--pale-navy);\n  border: 1.5px solid var(--blue);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-shrink: 0;\n  margin-top: 2px;\n}\n\n.reason-title {\n  font-size: 13.5px;\n  font-weight: 700;\n  color: var(--navy);\n  margin-bottom: 3px;\n}\n.reason-desc {\n  font-size: 12.5px;\n  color: var(--text);\n  line-height: 1.55;\n  margin-bottom: 6px;\n}\n.reason-fix {\n  font-size: 12px;\n  line-height: 1.55;\n  padding: 8px 11px;\n  border-left: 3px solid var(--blue);\n  background: var(--pale-navy);\n  color: var(--navy);\n}\n.reason-fix strong { font-weight: 700; }\n.reason-fix a { color: var(--navy); font-weight: 700; }\n\n/* ══════════════════════════════════════\n   RETURN-REASONS VIEW TOGGLE + ACCORDION\n══════════════════════════════════════ */\n.view-toggle { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }\n.view-toggle-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }\n.seg { display: inline-flex; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }\n.seg-btn { font: inherit; font-size: 12px; font-weight: 700; color: var(--blue); background: var(--white); border: none; padding: 6px 14px; cursor: pointer; transition: background .12s, color .12s; }\n.seg-btn + .seg-btn { border-left: 1px solid var(--border); }\n.seg-btn.active { background: var(--blue); color: var(--white); }\n.expand-all { font: inherit; font-size: 12px; font-weight: 700; color: var(--teal); background: none; border: none; cursor: pointer; padding: 4px 2px; text-decoration: underline; }\n.expand-all[hidden] { display: none; }\n\n/* Accordion mode — only active when section has .reasons-accordion */\n.reasons-accordion .reason-title {\n  cursor: pointer;\n  display: flex;\n  align-items: flex-start;\n  justify-content: space-between;\n  gap: 12px;\n  margin-bottom: 0;\n  transition: color .12s;\n}\n.reasons-accordion .reason-title:hover { color: var(--blue); }\n.reasons-accordion .reason-title::after {\n  content: \"\";\n  width: 8px; height: 8px;\n  border-right: 2px solid var(--muted);\n  border-bottom: 2px solid var(--muted);\n  transform: rotate(45deg);\n  transition: transform .18s ease;\n  flex-shrink: 0;\n  margin-top: 4px;\n  margin-right: 2px;\n}\n.reasons-accordion .reason.reason-open .reason-title::after { transform: rotate(-135deg); }\n.reasons-accordion .reason-desc,\n.reasons-accordion .reason-fix { display: none; }\n.reasons-accordion .reason.reason-open .reason-desc { display: block; margin-top: 7px; }\n.reasons-accordion .reason.reason-open .reason-fix { display: block; }\n\n@media (max-width: 480px) {\n  .reason-stat-bar { grid-template-columns: 1fr; }\n}\n\n@media print {\n  body { background: #fff; padding: 0; }\n  .eligibility { background: #fff; border: 1px solid var(--border); }\n  .eligibility-title, .eligibility-list li, .eligibility-list strong, .eligibility-sub { color: var(--text); }\n  .eligibility-eyebrow { color: var(--blue); }\n  .eligibility-note { color: var(--gray); border-top-color: var(--border); }\n  .view-toggle { display: none; }\n  .reasons-accordion .reason-desc,\n  .reasons-accordion .reason.reason-open .reason-desc { display: block !important; margin-top: 6px; }\n  .reasons-accordion .reason-fix,\n  .reasons-accordion .reason.reason-open .reason-fix { display: block !important; }\n  .reasons-accordion .reason-title::after { display: none; }\n  .section-wrap { border-top: 2px solid var(--blue); border-radius: 0; margin-bottom: 1.5rem; padding: 1rem 0; }\n  .nav { display: none; }\n  .reason-stat-bar { display: none; }\n  .progress-row { display: none; }\n  .cb { display: none; }\n  .item { gap: 0; }\n  .item::before { content: \"☐\"; margin-right: 10px; color: var(--gray); font-size: 14px; }\n  .item.done .lbl-main { text-decoration: none; color: var(--text); }\n  #ready-banner { display: none !important; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"page\">\n\n  <!-- ══ HEADER ══ -->\n  <header class=\"site-header\">\n    <a class=\"logo-link\" href=\"https://dss.niagads.org\" target=\"_blank\" rel=\"noopener\" aria-label=\"NIAGADS Data Sharing Service\"><svg class=\"site-logo\" version=\"1.1\" id=\"Layer_1\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" x=\"0px\" y=\"0px\" viewBox=\"0 0 1632.1 527\" style=\"enable-background:new 0 0 1632.1
