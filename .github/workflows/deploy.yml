name: deploy

# Every merge to main deploys the page. No SSH keys or long-lived secrets:
# GitHub OIDC assumes a branch-scoped AWS role, then triggers a remote pull.
# Environment-specific identifiers (role ARN, target instance, deploy path) are
# stored as repository Actions secrets so nothing infrastructure-specific is
# published in this file.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dss-dar-checklist
  cancel-in-progress: false

permissions:
  id-token: write   # required to request the OIDC token
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger deploy target to pull latest
        env:
          INSTANCE_ID: ${{ secrets.SSM_INSTANCE_ID }}
          REPO_DIR: ${{ secrets.DEPLOY_REPO_DIR }}
        run: |
          set -euo pipefail

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy dss-dar-checklist ${GITHUB_SHA::7}" \
            --parameters '{"commands":["set -euo pipefail","REPO='"$REPO_DIR"'","git -C \"$REPO\" fetch --prune origin","git -C \"$REPO\" reset --hard origin/main","echo deployed $(git -C \"$REPO\" rev-parse --short HEAD)"]}' \
            --query Command.CommandId --output text)
          echo "CommandId=$CMD_ID"

          # Poll until the invocation reaches a terminal state.
          STATUS=Pending
          for i in $(seq 1 30); do
            sleep 4
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo Pending)
            echo "poll $i: $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut|Undeliverable|Terminated) break ;;
            esac
          done

          echo "----- stdout -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query StandardOutputContent --output text || true
          echo "----- stderr -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query StandardErrorContent --output text || true

          test "$STATUS" = "Success"
